<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ant Writer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #faf9f6;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .input-area {
      margin-top: 80px;
      text-align: center;
    }

    .input-area input {
      font-family: 'Courier New', monospace;
      font-size: 28px;
      letter-spacing: 6px;
      border: none;
      border-bottom: 2px solid #222;
      background: transparent;
      padding: 8px 16px;
      text-align: center;
      outline: none;
      color: #222;
      width: 500px;
      max-width: 90vw;
    }

    .input-area input::placeholder {
      color: #bbb;
      letter-spacing: 4px;
      font-size: 18px;
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #aaa;
      letter-spacing: 2px;
    }

    canvas {
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div class="input-area">
    <input type="text" id="wordInput" placeholder="type a word" maxlength="12" autofocus spellcheck="false" autocomplete="off">
    <div class="hint">press enter or just type</div>
  </div>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const input = document.getElementById('wordInput');

    // Canvas sizing
    const W = Math.min(window.innerWidth - 40, 900);
    const H = Math.min(window.innerHeight - 250, 500);
    canvas.width = W;
    canvas.height = H;

    // --- Letter path definitions (simple pixel font on a 5x7 grid) ---
    const LETTER_PATHS = {
      'A': [[0,6],[0,3],[0,1],[1,0],[2,0],[3,0],[4,1],[4,3],[4,6],[4,3],[0,3]],
      'B': [[0,6],[0,0],[3,0],[4,1],[4,2],[3,3],[0,3],[3,3],[4,4],[4,5],[3,6],[0,6]],
      'C': [[4,1],[3,0],[1,0],[0,1],[0,5],[1,6],[3,6],[4,5]],
      'D': [[0,6],[0,0],[3,0],[4,1],[4,5],[3,6],[0,6]],
      'E': [[4,0],[0,0],[0,3],[3,3],[0,3],[0,6],[4,6]],
      'F': [[4,0],[0,0],[0,3],[3,3],[0,3],[0,6]],
      'G': [[4,1],[3,0],[1,0],[0,1],[0,5],[1,6],[3,6],[4,5],[4,3],[2,3]],
      'H': [[0,0],[0,6],[0,3],[4,3],[4,0],[4,6]],
      'I': [[1,0],[3,0],[2,0],[2,6],[1,6],[3,6]],
      'J': [[1,0],[4,0],[4,5],[3,6],[1,6],[0,5]],
      'K': [[0,0],[0,6],[0,3],[4,0],[0,3],[4,6]],
      'L': [[0,0],[0,6],[4,6]],
      'M': [[0,6],[0,0],[2,3],[4,0],[4,6]],
      'N': [[0,6],[0,0],[4,6],[4,0]],
      'O': [[1,0],[0,1],[0,5],[1,6],[3,6],[4,5],[4,1],[3,0],[1,0]],
      'P': [[0,6],[0,0],[3,0],[4,1],[4,2],[3,3],[0,3]],
      'Q': [[1,0],[0,1],[0,5],[1,6],[3,6],[4,5],[4,1],[3,0],[1,0],[3,5],[4,6]],
      'R': [[0,6],[0,0],[3,0],[4,1],[4,2],[3,3],[0,3],[2,3],[4,6]],
      'S': [[4,1],[3,0],[1,0],[0,1],[0,2],[1,3],[3,3],[4,4],[4,5],[3,6],[1,6],[0,5]],
      'T': [[0,0],[4,0],[2,0],[2,6]],
      'U': [[0,0],[0,5],[1,6],[3,6],[4,5],[4,0]],
      'V': [[0,0],[2,6],[4,0]],
      'W': [[0,0],[1,6],[2,3],[3,6],[4,0]],
      'X': [[0,0],[4,6],[2,3],[0,6],[4,0]],
      'Y': [[0,0],[2,3],[4,0],[2,3],[2,6]],
      'Z': [[0,0],[4,0],[0,6],[4,6]],
      '0': [[1,0],[0,1],[0,5],[1,6],[3,6],[4,5],[4,1],[3,0],[1,0]],
      '1': [[1,1],[2,0],[2,6],[1,6],[3,6]],
      '2': [[0,1],[1,0],[3,0],[4,1],[4,2],[0,6],[4,6]],
      '3': [[0,1],[1,0],[3,0],[4,1],[4,2],[3,3],[4,4],[4,5],[3,6],[1,6],[0,5]],
      '4': [[0,0],[0,3],[4,3],[4,0],[4,6]],
      '5': [[4,0],[0,0],[0,3],[3,3],[4,4],[4,5],[3,6],[1,6],[0,5]],
      '6': [[3,0],[1,0],[0,1],[0,5],[1,6],[3,6],[4,5],[4,4],[3,3],[0,3]],
      '7': [[0,0],[4,0],[2,6]],
      '8': [[1,0],[0,1],[0,2],[1,3],[3,3],[4,2],[4,1],[3,0],[1,0],[0,4],[0,5],[1,6],[3,6],[4,5],[4,4],[3,3]],
      '9': [[4,3],[1,3],[0,2],[0,1],[1,0],[3,0],[4,1],[4,5],[3,6],[1,6]],
      ' ': [],
    };

    // --- Build full path from text ---
    function buildPath(text) {
      const points = [];
      const letterW = 5;
      const letterH = 7;
      const scale = Math.min(40, (W - 60) / (text.length * (letterW + 1.5)));
      const totalW = text.length * (letterW + 1.5) * scale;
      const offsetX = (W - totalW) / 2;
      const offsetY = (H - letterH * scale) / 2;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i].toUpperCase();
        const lp = LETTER_PATHS[ch];
        if (!lp || lp.length === 0) continue;
        const lx = offsetX + i * (letterW + 1.5) * scale;
        for (const [gx, gy] of lp) {
          points.push({ x: lx + gx * scale, y: offsetY + gy * scale });
        }
      }
      return points;
    }

    // --- Interpolate path for smooth movement ---
    function interpolatePath(points, stepSize) {
      if (points.length < 2) return points;
      const result = [points[0]];
      for (let i = 1; i < points.length; i++) {
        const prev = points[i - 1];
        const curr = points[i];
        const dx = curr.x - prev.x;
        const dy = curr.y - prev.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const steps = Math.max(1, Math.floor(dist / stepSize));
        for (let s = 1; s <= steps; s++) {
          result.push({
            x: prev.x + (dx * s) / steps,
            y: prev.y + (dy * s) / steps,
          });
        }
      }
      return result;
    }

    // --- Ant state ---
    let trail = [];
    let path = [];
    let pathIndex = 0;
    let antX = W / 2;
    let antY = H / 2;
    let antAngle = 0;
    let animating = false;
    let idleWander = true;
    let wanderTarget = { x: W / 2, y: H / 2 };
    let wanderTimer = 0;

    // --- Draw ant (geometric minimal flat design) ---
    function drawAnt(x, y, angle, size) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);

      const s = size || 6;
      ctx.fillStyle = '#222';
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1.4;
      ctx.lineCap = 'butt';

      // === Three body segments: circle - oval - circle ===
      // Abdomen (rear, largest circle)
      ctx.beginPath();
      ctx.arc(-s * 1.4, 0, s * 0.7, 0, Math.PI * 2);
      ctx.fill();

      // Thorax (middle, oval)
      ctx.beginPath();
      ctx.ellipse(0, 0, s * 0.55, s * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();

      // Head (front, small circle)
      ctx.beginPath();
      ctx.arc(s * 1.1, 0, s * 0.42, 0, Math.PI * 2);
      ctx.fill();

      // === Six legs: straight angled lines from thorax ===
      const legAngle = Math.PI * 0.38;
      const legLen1 = s * 0.9;
      const legLen2 = s * 0.7;
      const legOffsets = [-s * 0.35, 0, s * 0.35];
      // Subtle walk cycle — legs alternate slight angle shift
      const tick = Math.floor(Date.now() / 60);
      const phase = (tick % 2) === 0 ? 1 : -1;

      for (let side = -1; side <= 1; side += 2) {
        for (let i = 0; i < 3; i++) {
          const ox = legOffsets[i];
          const alt = ((i % 2 === 0) ? phase : -phase) * 0.08;
          const baseAngle = side * legAngle + alt;

          // Upper leg segment
          const kneeX = ox + Math.cos(baseAngle) * legLen1;
          const kneeY = Math.sin(baseAngle) * legLen1;
          // Lower leg segment — angled further outward
          const footAngle = baseAngle + side * 0.5;
          const footX = kneeX + Math.cos(footAngle) * legLen2;
          const footY = kneeY + Math.sin(footAngle) * legLen2;

          ctx.beginPath();
          ctx.moveTo(ox, 0);
          ctx.lineTo(kneeX, kneeY);
          ctx.lineTo(footX, footY);
          ctx.stroke();
        }
      }

      // === Two antennae: straight lines with small dot tips ===
      const aLen = s * 1.2;
      const aSpread = Math.PI * 0.2;
      for (let side = -1; side <= 1; side += 2) {
        const ax = s * 1.4 + Math.cos(side * aSpread) * aLen;
        const ay = Math.sin(side * aSpread) * aLen;
        ctx.beginPath();
        ctx.moveTo(s * 1.4, 0);
        ctx.lineTo(ax, ay);
        ctx.stroke();
        // Dot at tip
        ctx.beginPath();
        ctx.arc(ax, ay, s * 0.12, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    // --- Draw trail (the "ink" the ant leaves) ---
    function drawTrail() {
      if (trail.length < 2) return;
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(trail[0].x, trail[0].y);
      for (let i = 1; i < trail.length; i++) {
        const prev = trail[i - 1];
        const curr = trail[i];
        const dx = curr.x - prev.x;
        const dy = curr.y - prev.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        // Break the stroke if there's a big jump (between letters)
        if (dist > 60) {
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(curr.x, curr.y);
        } else {
          ctx.lineTo(curr.x, curr.y);
        }
      }
      ctx.stroke();
    }

    // --- Idle wander ---
    function updateWander() {
      wanderTimer--;
      if (wanderTimer <= 0) {
        wanderTarget = {
          x: 80 + Math.random() * (W - 160),
          y: 80 + Math.random() * (H - 160),
        };
        wanderTimer = 120 + Math.random() * 200;
      }
      const dx = wanderTarget.x - antX;
      const dy = wanderTarget.y - antY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 2) {
        const speed = 2.5;
        antX += (dx / dist) * speed;
        antY += (dy / dist) * speed;
        antAngle = Math.atan2(dy, dx);
      }
    }

    // --- Animation loop ---
    function animate() {
      ctx.clearRect(0, 0, W, H);

      // Draw existing trail
      drawTrail();

      if (animating && pathIndex < path.length) {
        const target = path[pathIndex];
        const dx = target.x - antX;
        const dy = target.y - antY;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 4) {
          trail.push({ x: antX, y: antY });
          pathIndex++;
        } else {
          const speed = 8;
          antX += (dx / dist) * speed;
          antY += (dy / dist) * speed;
          antAngle = Math.atan2(dy, dx);
          trail.push({ x: antX, y: antY });
        }

        if (pathIndex >= path.length) {
          animating = false;
          idleWander = true;
        }
      } else if (idleWander) {
        updateWander();
      }

      drawAnt(antX, antY, antAngle, 6);

      requestAnimationFrame(animate);
    }

    // --- Start writing ---
    function startWriting(text) {
      if (!text.trim()) return;
      const rawPath = buildPath(text.trim());
      if (rawPath.length === 0) return;

      path = interpolatePath(rawPath, 3);
      pathIndex = 0;
      trail = [];
      animating = true;
      idleWander = false;
    }

    // --- Input handling ---
    let debounceTimer = null;
    input.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        startWriting(input.value);
      }, 600);
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        clearTimeout(debounceTimer);
        startWriting(input.value);
      }
    });

    // --- Go ---
    animate();
  </script>
</body>
</html>
